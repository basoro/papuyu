server {
    listen 8080;
    server_name localhost;

    # Increase header buffer sizes because Traefik appends many internal headers
    # when forwarding requests to the ModSecurity plugin, which can exceed Nginx's defaults.
    client_header_buffer_size 64k;
    large_client_header_buffers 4 64k;

    # The Traefik plugin forwards requests here for inspection.
    # If ModSecurity doesn't block it (403), we must return 200 OK
    # so the plugin knows the request is clean and can forward it to the real app.
    
    location / {
        # Enable ModSecurity
        modsecurity on;
        modsecurity_rules_file /etc/modsecurity.d/setup.conf;

        # Always return 200 OK if ModSecurity allows the request
        return 200 "OK";
    }
}
