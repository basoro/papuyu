# We don't define a new server block because the base image already has one that loads ModSecurity rules.
# If we define it again, the rules load twice and Nginx crashes with "Rule id: 200000 is duplicated".

# We just inject the large header settings directly into the http context or existing server context.
# Since this file is loaded in conf.d/ it sits at the http {} level in the main nginx.conf.
client_header_buffer_size 64k;
large_client_header_buffers 4 64k;
client_max_body_size 50m;

# To satisfy the Traefik plugin which expects a 200 OK for clean requests, 
# we create a tiny dummy server block on a different port (8081) and set the BACKEND env var to point to it.
# The base image's default server block (on 8080) will inspect the traffic via ModSecurity, 
# and if it passes, it will proxy it to this 8081 block, which then simply returns 200 OK back to Traefik.
server {
    listen 8081;
    server_name localhost;

    location / {
        return 200 "OK";
    }
}
