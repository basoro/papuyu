server {
    listen 8080;
    server_name localhost;

    # The Traefik plugin forwards requests here for inspection.
    # If ModSecurity doesn't block it (403), we must return 200 OK
    # so the plugin knows the request is clean and can forward it to the real app.
    
    location / {
        # Enable ModSecurity
        modsecurity on;
        modsecurity_rules_file /etc/modsecurity.d/setup.conf;

        # Always return 200 OK if ModSecurity allows the request
        return 200 "OK";
    }
}
