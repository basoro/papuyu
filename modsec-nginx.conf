server {
    listen 8080;
    server_name localhost;

    # We can define these at the server level, and if they fail, it's better than crashing the whole Nginx process.
    # However, Nginx allows large_client_header_buffers in the server block!
    client_header_buffer_size 64k;
    large_client_header_buffers 4 64k;
    client_max_body_size 50m;

    location / {
        modsecurity on;
        modsecurity_rules_file /etc/modsecurity.d/setup.conf;

        return 200 "OK";
    }
}
