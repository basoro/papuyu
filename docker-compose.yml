version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-${SERVER_IP:-localhost}}`)"
      - "traefik.http.routers.frontend.entrypoints=web,websecure"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
      - VITE_BASE_DOMAIN=${DOMAIN:-}
      - VITE_SERVER_IP=${SERVER_IP:-localhost}
      - VITE_FORCE_HTTPS=${FORCE_HTTPS:-false}
    networks:
      - papuyu-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker access
      - ./data:/app/data                            # SQLite persistence (Host Volume)
      - /tmp/papuyu-builds:/tmp/papuyu-builds          # Build directory
      - ./logs/modsec:/var/log/modsec
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-fallback-secret-key-change-me}
      - DB_PATH=/app/data/papuyu.db
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DOMAIN=${DOMAIN:-}
      - SERVER_IP=${SERVER_IP:-}
    dns:
      - 8.8.8.8
      - 1.1.1.1

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN:-${SERVER_IP:-localhost}}`) && PathPrefix(`/api`)" 
      - "traefik.http.services.backend.loadbalancer.server.port=4000"
      - "traefik.http.routers.backend.entrypoints=web,websecure"
    networks:
      - papuyu-network

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - papuyu-network

  modsecurity:
    image: owasp/modsecurity-crs:nginx-alpine
    environment:
      - SEC_RULE_ENGINE=DetectionOnly
      - BACKEND=http://127.0.0.1:8081 # Point to our custom dummy backend that returns 200 OK
      - SERVER_NAME=localhost
      # Configure Nginx to extract the real IP passed by Traefik
      - PROXY_PRESERVE_HOST=on
      - SET_REAL_IP_FROM=172.16.0.0/12
      - REAL_IP_HEADER=X-Forwarded-For
      # NGINX Configuration via environment variables supported by the CRS image
      - NGINX_KEEPALIVE_TIMEOUT=65
      - PORT=8080
      # Enable JSON logging ke stdout/stderr Nginx
      - MODSEC_AUDIT_LOG_FORMAT=JSON
      - MODSEC_AUDIT_LOG_TYPE=Serial
      - MODSEC_AUDIT_LOG=/dev/stderr
      - MODSEC_AUDIT_LOG_PARTS=ABHIJDEFZ
      - MODSEC_AUDIT_ENGINE=On
    networks:
      - papuyu-network
    volumes:
      # Mount as a specific conf.d file instead of overriding the template
      - ./modsec-nginx.conf:/etc/nginx/conf.d/zzz-custom.conf
      # Mount real IP extraction configuration
      - ./modsec-realip.conf:/etc/nginx/conf.d/00-realip.conf
      # Mount the log directory so the backend can read it
      - ./logs/modsec:/var/log/modsec

  traefik:
    image: traefik:v2.10
    container_name: papuyu-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.forwardedHeaders.insecure=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.forwardedHeaders.insecure=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=admin@rshd.my.id"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.websecure.http.tls.certResolver=myresolver"
      # Traefik basic configuration ends here
      - "--experimental.plugins.traefik-modsecurity-plugin.moduleName=github.com/acouvreur/traefik-modsecurity-plugin"
      - "--experimental.plugins.traefik-modsecurity-plugin.version=v1.3.0"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=${TRAEFIK_HTTPS_ENABLED:-false}"
      - "traefik.http.routers.http-catchall.rule=hostregexp(`{host:.+}`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.routers.http-catchall.priority=100"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - papuyu-network

volumes:
  papuyu-data:
  redis-data:

networks:
  papuyu-network:
    name: papuyu-network
    driver: bridge
