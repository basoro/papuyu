version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`rshd.my.id`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=https://api.rshd.my.id
    networks:
      - papuyu-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker access
      - ./data:/app/data                            # SQLite persistence (Host Volume)
      - /tmp/papuyu-builds:/tmp/papuyu-builds          # Build directory
      - ./logs/modsec:/var/log/modsec:ro
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - DB_PATH=/app/data/papuyu.db
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    dns:
      - 8.8.8.8
      - 1.1.1.1

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.rshd.my.id`)" 
      - "traefik.http.services.backend.loadbalancer.server.port=4000"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
    networks:
      - papuyu-network

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - papuyu-network

  modsecurity:
    image: owasp/modsecurity-crs:nginx
    environment:
      - SEC_RULE_ENGINE=DetectionOnly
      - BACKEND=http://127.0.0.1:8081 # Point to our custom dummy backend that returns 200 OK
      - SERVER_NAME=localhost
      # NGINX Configuration via environment variables supported by the CRS image
      - NGINX_KEEPALIVE_TIMEOUT=65
      - PORT=8080
    networks:
      - papuyu-network
    volumes:
      # Mount as a specific conf.d file instead of overriding the template
      - ./modsec-nginx.conf:/etc/nginx/conf.d/zzz-custom.conf
      - ./modsecurity-override.conf:/etc/nginx/modsecurity.d/modsecurity-override.conf
      # Mount the log directory so the backend can read it
      - ./logs/modsec:/var/log/modsec

  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=admin@rshd.my.id"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--experimental.plugins.traefik-modsecurity-plugin.moduleName=github.com/acouvreur/traefik-modsecurity-plugin"
      - "--experimental.plugins.traefik-modsecurity-plugin.version=v1.3.0"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - papuyu-network

volumes:
  papuyu-data:
  redis-data:

networks:
  papuyu-network:
    name: papuyu-network
    driver: bridge
