# Trust the Docker network (where Traefik resides)
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 10.0.0.0/8;

# Use X-Forwarded-For header sent by Traefik
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# We configure log format to also include X-Forwarded-For just in case
log_format combined_realip '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'X-Forwarded-For: $http_x_forwarded_for';
                           
access_log /var/log/nginx/access.log combined_realip;
